name: 'lint'

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: 'Lint'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          CI: true

      - name: Lint
        run: bun run lint
        env:
          CI: true

      - name: Typecheck
        run: bun run typecheck
        env:
          CI: true
